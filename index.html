<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NextRise 2026, Seoul 채용밋업</title>

  <!-- ============================================================
       [CSS 스타일]
       ============================================================ -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif;
      background: #f7f7fb;
      color: #1a1a2e;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ============================================================
       [상단 헤더] - 애플 이벤트 스타일 (미니멀 & 집중형)
       ============================================================ */
    header {
      background:
        radial-gradient(ellipse at 20% 0%, rgba(168, 85, 247, 0.45) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 100%, rgba(106, 17, 203, 0.5) 0%, transparent 55%),
        linear-gradient(135deg, #2a0759 0%, #4c0ba8 40%, #6a11cb 75%, #8e2de2 100%);
      color: #fff;
      padding: 110px 24px 130px;
      text-align: center;             /* ← 모든 텍스트 중앙 정렬 */
      position: relative;
      overflow: hidden;
    }
    /* 도트 패턴 */
    header::before {
      content: "";
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background:
        radial-gradient(circle, rgba(255,255,255,0.08) 1.2px, transparent 1.2px);
      background-size: 32px 32px;
      pointer-events: none;
    }
    /* 사선 라인 패턴 */
    header::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          135deg,
          rgba(255,255,255,0.035) 0,
          rgba(255,255,255,0.035) 1px,
          transparent 1px,
          transparent 24px
        );
      pointer-events: none;
    }

    /* 떠다니는 기하 도형들 (더 은은하게) */
    .deco-shape {
      position: absolute;
      pointer-events: none;
      opacity: 0.13;
      animation: floatY 9s ease-in-out infinite;
    }
    .deco-shape.s1 {
      top: 30px; left: 8%;
      width: 90px; height: 90px;
      border: 2px solid #fff; border-radius: 50%;
      animation-delay: 0s;
    }
    .deco-shape.s2 {
      top: 70px; right: 10%;
      width: 60px; height: 60px;
      border: 2px solid #ffd5ff; border-radius: 14px;
      transform: rotate(20deg);
      animation-delay: 1.5s;
    }
    .deco-shape.s3 {
      bottom: 50px; left: 12%;
      width: 40px; height: 40px;
      background: rgba(255, 213, 255, 0.35);
      border-radius: 8px;
      transform: rotate(45deg);
      animation-delay: 3s;
    }
    .deco-shape.s4 {
      bottom: 70px; right: 6%;
      width: 110px; height: 110px;
      border: 2px dashed #fff; border-radius: 50%;
      animation-delay: 2s;
    }
    @keyframes floatY {
      0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
      50%      { transform: translateY(-14px) rotate(var(--r, 0deg)); }
    }

    .header-inner {
      position: relative;
      z-index: 2;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;            /* ← 중앙 정렬 강화 */
      gap: 22px;
    }

    /* (1) Shape the Next - 반투명 글래스 알약 뱃지 */
    @keyframes pillGlow {
      0%, 100% {
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.15) inset,
          0 0 18px rgba(255, 213, 255, 0.35);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.25) inset,
          0 0 32px rgba(255, 213, 255, 0.65);
      }
    }
    .slogan-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 5px;
      color: #fff;
      padding: 8px 20px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.18);
      text-transform: uppercase;
      animation: pillGlow 3.5s ease-in-out infinite;
    }
    .slogan-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ffd5ff;
      box-shadow: 0 0 8px #ffd5ff;
    }

    /* (2) 메인 타이틀 - 가장 크고 두꺼운 그라데이션 텍스트 */
    .main-title {
      font-size: clamp(2.4rem, 6vw, 4.4rem);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1.05;
      background: linear-gradient(
        180deg,
        #ffffff 0%,
        #f3e8ff 40%,
        #ffd5ff 70%,
        #ffffff 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 24px rgba(255, 213, 255, 0.25));
    }
    .main-title .accent {
      background: linear-gradient(90deg, #ffd5ff 0%, #ffffff 50%, #ffd5ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* (3) 일시/장소 - 얇은 폰트 */
    .event-info {
      font-size: 1.05rem;
      font-weight: 300;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .event-info .sep {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      display: inline-block;
    }
    .event-info strong {
      font-weight: 500;
      color: #fff;
    }

    /* ============================================================
       [검색+정렬 바] - 헤더에 오버랩 + 입체감
       ============================================================ */
    .control-bar {
      max-width: 1000px;
      margin: -32px auto 0;          /* 헤더와 본문에 반쯤 걸치게 */
      padding: 0 16px;
      display: flex;
      gap: 10px;
      position: relative;
      z-index: 20;
      align-items: center;
      flex-wrap: nowrap;
    }
    .control-bar input,
    .control-bar .sort-dropdown .sort-btn {
      box-shadow:
        0 22px 50px rgba(42, 7, 89, 0.30),
        0 8px 18px rgba(76, 11, 168, 0.18),
        0 1px 2px rgba(0, 0, 0, 0.04);
    }
    .control-bar input {
      flex: 1 1 auto;
      min-width: 0;
      padding: 17px 22px;
      font-size: 1rem;
      border: none;
      border-radius: 999px;
      outline: none;
      background: #fff;
      transition: box-shadow .2s, transform .2s;
    }
    .control-bar input:focus {
      box-shadow:
        0 22px 50px rgba(42, 7, 89, 0.36),
        0 8px 18px rgba(76, 11, 168, 0.22),
        0 0 0 3px rgba(168, 85, 247, 0.25);
    }

    /* ----- 커스텀 정렬 드롭다운 ----- */
    .sort-dropdown { position: relative; flex: 0 0 auto; }
    .sort-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 17px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a1a2e;
      background: #fff;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      outline: none;
      transition: transform .15s, box-shadow .2s;
      white-space: nowrap;
    }
    .sort-btn:hover { transform: translateY(-1px); }
    .sort-btn .sort-label-prefix { color: #888; font-weight: 500; }
    .sort-btn .sort-label-value  { color: #6a11cb; font-weight: 700; }
    .sort-btn .caret {
      font-size: 0.7rem; color: #a855f7;
      transition: transform .25s ease;
      margin-left: 2px;
    }
    .sort-dropdown.open .sort-btn .caret { transform: rotate(180deg); }

    .sort-popup {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      min-width: 200px;
      background: #fff;
      border-radius: 14px;
      box-shadow:
        0 20px 50px rgba(76, 11, 168, 0.25),
        0 4px 12px rgba(0, 0, 0, 0.06);
      list-style: none;
      padding: 8px;
      margin: 0;
      z-index: 30;
      opacity: 0;
      transform: translateY(-8px) scale(0.97);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      transform-origin: top right;
    }
    .sort-dropdown.open .sort-popup {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .sort-popup li {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 0.93rem;
      color: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: background .15s, color .15s;
      user-select: none;
    }
    .sort-popup li:hover { background: #f3eeff; color: #6a11cb; }
    .sort-popup li.selected {
      color: #6a11cb; font-weight: 700; background: #faf5ff;
    }
    .sort-popup li .check {
      color: #a855f7; font-weight: 700; visibility: hidden;
    }
    .sort-popup li.selected .check { visibility: visible; }

    /* ----- 메인 필터 영역 ----- */
    .filter-bar {
      max-width: 1200px;
      margin: 24px auto 0;
      padding: 0 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    .filter-divider {
      width: 1px; height: 22px;
      background: #e5e0f0; margin: 0 4px;
    }

    /* ----- 칩 공통 ----- */
    .chip {
      padding: 8px 16px;
      border-radius: 999px;
      background: #fff;
      border: 1.5px solid #e5e0f0;
      font-size: 0.9rem;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      transition: all .2s ease;
      user-select: none;
      white-space: nowrap;
    }
    .chip:hover { border-color: #a855f7; color: #6a11cb; }
    .chip.active {
      background: linear-gradient(135deg, #6a11cb, #a855f7);
      color: #fff; border-color: transparent;
      box-shadow: 0 4px 16px rgba(106, 17, 203, 0.3);
    }
    .chip.chip-bookmark {
      border-color: #d9f99d; color: #4d7c0f; background: #f7fee7;
    }
    .chip.chip-bookmark.active {
      background: linear-gradient(135deg, #65a30d, #a3e635);
      color: #fff; border-color: transparent;
      box-shadow: 0 4px 16px rgba(132, 204, 22, 0.4);
    }

    /* ----- 상세 필터 버튼 ----- */
    .advanced-btn {
      padding: 8px 16px;
      border-radius: 999px;
      background: #fff;
      border: 1.5px dashed #a855f7;
      font-size: 0.9rem;
      font-weight: 600;
      color: #6a11cb;
      cursor: pointer;
      transition: all .2s ease;
      white-space: nowrap;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .advanced-btn:hover { background: #f3eeff; transform: translateY(-1px); }
    .advanced-btn .badge {
      background: #6a11cb; color: #fff;
      font-size: 0.72rem; font-weight: 700;
      padding: 1px 7px; border-radius: 999px;
      min-width: 18px; text-align: center;
    }

    /* ----- 선택된 상세 태그 Pill ----- */
    .active-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 6px 6px 12px;
      border-radius: 999px;
      background: #f3eeff;
      color: #6a11cb;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid #d4b3ff;
    }
    .active-tag button {
      background: rgba(106, 17, 203, 0.15);
      border: none; width: 20px; height: 20px;
      border-radius: 50%; cursor: pointer;
      color: #6a11cb; font-size: 0.75rem; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background .15s; line-height: 1;
    }
    .active-tag button:hover { background: #6a11cb; color: #fff; }

    /* ----- 결과 카운트 ----- */
    .count {
      max-width: 1200px;
      margin: 24px auto 16px;
      padding: 0 24px;
      font-size: 0.95rem;
      color: #666;
    }
    .count strong { color: #6a11cb; }

    /* ----- 카드 그리드 ----- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto 80px;
      padding: 0 24px;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      cursor: pointer;
      border: 1px solid #ececf2;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      opacity: 0;
      animation: cardFadeIn .45s ease-out forwards;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(106, 17, 203, 0.15);
      border-color: #d4b3ff;
    }
    .card .logo {
      width: 56px; height: 56px;
      border-radius: 12px; object-fit: cover;
      background: #f0f0f5;
    }
    .card .company-name { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; }
    .card .position-title { font-size: 0.98rem; color: #444; font-weight: 500; }
    .card .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
    .card .tag {
      font-size: 0.78rem; padding: 4px 10px;
      border-radius: 999px; background: #f3eeff;
      color: #6a11cb; font-weight: 500;
    }

    @media (prefers-reduced-motion: reduce) {
      .card, .deco-shape, .slogan-pill { animation: none !important; opacity: 1 !important; }
    }

    /* ----- 하트(찜) 버튼 ----- */
    .bookmark-btn {
      position: absolute; top: 14px; right: 14px;
      width: 36px; height: 36px; border-radius: 50%;
      background: #f7f7fb; border: none; cursor: pointer;
      font-size: 1.2rem; display: flex;
      align-items: center; justify-content: center;
      transition: transform .15s, background .2s; z-index: 2;
    }
    .bookmark-btn:hover { transform: scale(1.15); background: #fff0f5; }
    .bookmark-btn.bookmarked { background: #ffe4ec; }
    .bookmark-btn .heart { color: #cbd5e1; transition: color .2s; }
    .bookmark-btn.bookmarked .heart { color: #ec4899; }

    /* ----- Empty State ----- */
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    .no-result {
      grid-column: 1 / -1;
      text-align: center;
      padding: 70px 20px 80px;
      color: #666;
      animation: popIn .35s ease-out;
    }
    .no-result .empty-emoji {
      font-size: 4.5rem; margin-bottom: 16px;
      display: inline-block; filter: grayscale(0.2);
    }
    .no-result h3 {
      font-size: 1.35rem; font-weight: 800;
      color: #1a1a2e; margin-bottom: 8px;
    }
    .no-result p {
      font-size: 0.98rem; color: #888; margin-bottom: 28px;
    }
    .reset-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px;
      font-size: 0.98rem; font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #6a11cb, #a855f7);
      border: none; border-radius: 999px;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 8px 24px rgba(106, 17, 203, 0.35);
      transition: transform .2s, box-shadow .2s;
    }
    .reset-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(106, 17, 203, 0.45);
    }
    .reset-btn:active { transform: translateY(0); }

    /* ----- 모달 ----- */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(20, 10, 40, 0.6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff; border-radius: 20px;
      max-width: 760px; width: 100%;
      max-height: 90vh; overflow-y: auto;
      position: relative;
      animation: pop .25s ease-out;
    }
    @keyframes pop {
      from { transform: scale(0.95); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .modal-header {
      background: linear-gradient(135deg, #6a11cb 0%, #a855f7 100%);
      color: #fff;
      padding: 32px;
      border-radius: 20px 20px 0 0;
      position: relative;
    }
    .modal-header .top {
      display: flex; align-items: center; gap: 16px; margin-bottom: 16px;
    }
    .modal-header img {
      width: 64px; height: 64px;
      border-radius: 14px;
      background: #fff; object-fit: cover;
    }
    .modal-header h2 { font-size: 1.5rem; margin-bottom: 4px; }
    .modal-header a { color: #ffd5ff; font-size: 0.9rem; text-decoration: none; }
    .modal-header a:hover { text-decoration: underline; }
    .modal-header .position { font-size: 1.3rem; font-weight: 700; margin-top: 12px; }
    .modal-header p.subtitle { font-size: 0.95rem; opacity: 0.9; margin-top: 4px; }

    .close-btn {
      position: absolute; top: 16px; right: 16px;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.2); border: none;
      color: #fff; font-size: 1.3rem; cursor: pointer;
    }
    .close-btn:hover { background: rgba(255,255,255,0.35); }

    .modal-body { padding: 28px 32px 40px; }

    .filter-modal { max-width: 560px; }
    .filter-section { margin-bottom: 24px; }
    .filter-section h3 {
      font-size: 1.05rem; font-weight: 800; color: #1a1a2e;
      padding-left: 12px; border-left: 4px solid #6a11cb;
      margin-bottom: 14px;
    }
    .filter-section .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .filter-modal-footer {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; padding-top: 8px;
      border-top: 1px solid #ececf2; margin-top: 8px;
    }
    .filter-modal-footer .btn {
      padding: 12px 24px; border-radius: 10px; border: none;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: all .2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6a11cb, #a855f7);
      color: #fff;
      box-shadow: 0 4px 14px rgba(106, 17, 203, 0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); }
    .btn-ghost { background: #f7f7fb; color: #6a11cb; }
    .btn-ghost:hover { background: #f3eeff; }

    .info-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 12px 20px; background: #faf7ff;
      padding: 18px 20px; border-radius: 12px; margin-bottom: 28px;
    }
    .info-grid div { font-size: 0.9rem; }
    .info-grid .label {
      color: #6a11cb; font-size: 0.9rem; font-weight: 700;
      display: block; margin-bottom: 4px;
    }

    .section { margin-bottom: 28px; }
    .section h3 {
      font-size: 1.25rem; font-weight: 800; color: #1a1a2e;
      padding-left: 14px; border-left: 5px solid #6a11cb;
      margin-bottom: 14px;
    }
    .section ul { list-style: none; padding-left: 0; }
    .section li { padding: 6px 0 6px 18px; position: relative; color: #333; }
    .section li::before {
      content: "•"; position: absolute; left: 0;
      color: #a855f7; font-weight: bold;
    }
    .section p { color: #333; margin-bottom: 6px; }
    .section .sub-title {
      font-weight: 600; color: #6a11cb;
      margin-top: 12px; margin-bottom: 4px;
    }

    .download-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #f3eeff; color: #6a11cb;
      padding: 12px 20px; border-radius: 8px;
      text-decoration: none; font-weight: 700; font-size: 0.95rem;
      margin-bottom: 28px;
      transition: background .2s, transform .2s;
    }
    .download-btn:hover { background: #e5d9f9; transform: translateY(-2px); }

    /* ----- 반응형 ----- */
    @media (max-width: 600px) {
      header { padding: 80px 20px 110px; }
      .deco-shape.s1 { width: 50px; height: 50px; }
      .deco-shape.s4 { width: 70px; height: 70px; }
      .slogan-pill { font-size: 0.7rem; letter-spacing: 4px; padding: 6px 16px; }
      .event-info { font-size: 0.95rem; gap: 10px; }

      .info-grid { grid-template-columns: 1fr; }
      .modal-header, .modal-body { padding: 24px; }

      .control-bar { flex-wrap: wrap; gap: 8px; margin-top: -28px; }
      .control-bar input {
        flex: 1 1 100%; padding: 14px 18px; font-size: 0.95rem;
      }
      .sort-dropdown { flex: 1 1 100%; }
      .sort-btn { width: 100%; justify-content: center; padding: 13px 18px; }
      .sort-popup { right: auto; left: 0; width: 100%; transform-origin: top center; }
      .filter-divider { display: none; }
    }
  </style>
</head>

<body>

  <!-- ============================================================
       [HTML 구조]
       ============================================================ -->
  <header>
    <div class="deco-shape s1"></div>
    <div class="deco-shape s2"></div>
    <div class="deco-shape s3"></div>
    <div class="deco-shape s4"></div>

    <div class="header-inner">
      <!-- (1) Shape the Next 알약 뱃지 -->
      <div class="slogan-pill">
        <span class="dot"></span>
        Shape the Next
      </div>

      <!-- (2) 메인 타이틀 -->
      <h1 class="main-title">
        NextRise 2026, Seoul<br>
        <span class="accent">채용밋업</span>
      </h1>

      <!-- (3) 일시 / 장소 -->
      <div class="event-info">
        <span>📅 <strong>2026. 6. 18 ~ 19</strong></span>
        <span class="sep"></span>
        <span>📍 <strong>삼성동 COEX</strong></span>
      </div>
    </div>
  </header>

  <!-- 검색창 + 커스텀 정렬 드롭다운 (헤더에 오버랩) -->
  <div class="control-bar">
    <input type="text" id="searchInput" placeholder="🔍 기업명 또는 직무로 검색해보세요" />

    <div class="sort-dropdown" id="sortDropdown">
      <button type="button" class="sort-btn" id="sortBtn" aria-haspopup="listbox" aria-expanded="false">
        <span>↕️</span>
        <span class="sort-label-prefix">정렬:</span>
        <span class="sort-label-value" id="sortBtnLabel">기업명</span>
        <span class="caret">▼</span>
      </button>
      <ul class="sort-popup" id="sortPopup" role="listbox"></ul>
    </div>
  </div>

  <!-- 메인 필터 영역 -->
  <div class="filter-bar" id="filterBar"></div>

  <div class="count">총 <strong id="countNum">0</strong>개의 포지션이 열려있어요</div>

  <main class="grid" id="cardGrid"></main>

  <!-- 기업 상세 모달 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalBox">
      <button class="close-btn" id="closeBtn" aria-label="닫기">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- 상세 필터 모달 -->
  <div class="modal-overlay" id="filterModalOverlay">
    <div class="modal filter-modal">
      <button class="close-btn" id="filterCloseBtn" aria-label="닫기">✕</button>
      <div class="modal-header">
        <h2>🎛️ 상세 필터</h2>
        <p class="subtitle">원하는 조건을 선택하면 즉시 결과에 반영돼요</p>
      </div>
      <div class="modal-body">
        <div id="advancedFilterArea"></div>
        <div class="filter-modal-footer">
          <button class="btn btn-ghost" id="resetAdvancedBtn">전체 해제</button>
          <button class="btn btn-primary" id="filterDoneBtn">닫기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 데이터 -->
  <script src="data.js"></script>

  <!-- ============================================================
       [JS 로직]
       ============================================================ -->
  <script>

    /* 🎯 필터 정의 */
    const filterOptions = [
      {
        categoryKey: "position",
        category: "포지션",
        placement: "main",
        options: [
          { label: "프론트엔드", value: "프론트엔드" },
          { label: "백엔드",     value: "백엔드" }
        ]
      },
      {
        categoryKey: "employment",
        category: "고용 형태",
        placement: "advanced",
        options: [
          { label: "인턴",   value: "인턴" },
          { label: "계약직", value: "계약직" },
          { label: "정규직", value: "정규직" }
        ]
      },
      {
        categoryKey: "location",
        category: "근무지",
        placement: "advanced",
        options: [
          { label: "원격 근무", value: "원격 근무" },
          { label: "서울",     value: "서울" },
          { label: "경기",     value: "경기" },
          { label: "강원",     value: "강원" },
          { label: "충청",     value: "충청" },
          { label: "경상",     value: "경상" },
          { label: "전라",     value: "전라" },
          { label: "제주",     value: "제주" }
        ]
      }
    ];

    /* 정렬 옵션 */
    const sortOptions = [
      { key: "companyName",    label: "기업명",   sort: (a,b) => a.companyName.localeCompare(b.companyName, 'ko') },
      { key: "position",       label: "포지션",   sort: (a,b) => a.position.title.localeCompare(b.position.title, 'ko') },
      { key: "employmentType", label: "고용형태", sort: (a,b) => a.employmentType.localeCompare(b.employmentType, 'ko') },
      { key: "location",       label: "근무지",   sort: (a,b) => a.location.localeCompare(b.location, 'ko') }
    ];

    /* 상태 */
    const state = {
      keyword: "",
      activeTags: (() => {
        const obj = {};
        filterOptions.forEach(g => { obj[g.categoryKey] = []; });
        return obj;
      })(),
      showOnlyBookmarks: false,
      sortKey: "companyName"
    };

    /* 찜 */
    const BOOKMARK_KEY = 'jobfair_bookmarks';
    function getBookmarks() {
      const raw = localStorage.getItem(BOOKMARK_KEY);
      return raw ? JSON.parse(raw) : [];
    }
    function saveBookmarks(ids) { localStorage.setItem(BOOKMARK_KEY, JSON.stringify(ids)); }
    function isBookmarked(id) { return getBookmarks().includes(id); }
    function toggleBookmark(id) {
      let list = getBookmarks();
      if (list.includes(id)) list = list.filter(x => x !== id);
      else list.push(id);
      saveBookmarks(list);
    }

    /* ============================================================
       🆕 첨부파일 유효성 체크
       - undefined / null / 빈 문자열 / 공백만 있는 문자열 모두 false
       ============================================================ */
    function hasAttachment(co) {
      return typeof co.attachment === 'string' && co.attachment.trim() !== '';
    }

    /* DOM */
    const cardGrid           = document.getElementById('cardGrid');
    const searchInput        = document.getElementById('searchInput');
    const countNum           = document.getElementById('countNum');
    const modalOverlay       = document.getElementById('modalOverlay');
    const modalContent       = document.getElementById('modalContent');
    const closeBtn           = document.getElementById('closeBtn');
    const filterBar          = document.getElementById('filterBar');
    const filterModalOverlay = document.getElementById('filterModalOverlay');
    const filterCloseBtn     = document.getElementById('filterCloseBtn');
    const filterDoneBtn      = document.getElementById('filterDoneBtn');
    const resetAdvancedBtn   = document.getElementById('resetAdvancedBtn');
    const advancedFilterArea = document.getElementById('advancedFilterArea');

    const sortDropdown = document.getElementById('sortDropdown');
    const sortBtn      = document.getElementById('sortBtn');
    const sortBtnLabel = document.getElementById('sortBtnLabel');
    const sortPopup    = document.getElementById('sortPopup');


    /* ============================================================
       1) 메인 필터 바
       ============================================================ */
    function renderFilterBar() {
      filterBar.innerHTML = '';

      const bookmarkChip = document.createElement('div');
      bookmarkChip.className = 'chip chip-bookmark' + (state.showOnlyBookmarks ? ' active' : '');
      bookmarkChip.textContent = '⭐ 내가 찜한 공고';
      bookmarkChip.addEventListener('click', () => {
        state.showOnlyBookmarks = !state.showOnlyBookmarks;
        renderFilterBar();
        applyAndRender();
      });
      filterBar.appendChild(bookmarkChip);

      const divider1 = document.createElement('span');
      divider1.className = 'filter-divider';
      filterBar.appendChild(divider1);

      filterOptions
        .filter(group => group.placement === 'main')
        .forEach(group => {
          group.options.forEach(opt => {
            const isActive = state.activeTags[group.categoryKey].includes(opt.value);
            const chip = document.createElement('div');
            chip.className = 'chip' + (isActive ? ' active' : '');
            chip.textContent = opt.label;
            chip.addEventListener('click', () => {
              toggleTag(group.categoryKey, opt.value);
              renderFilterBar();
              applyAndRender();
            });
            filterBar.appendChild(chip);
          });
        });

      const divider2 = document.createElement('span');
      divider2.className = 'filter-divider';
      filterBar.appendChild(divider2);

      const advancedCount = filterOptions
        .filter(g => g.placement === 'advanced')
        .reduce((sum, g) => sum + state.activeTags[g.categoryKey].length, 0);

      const advBtn = document.createElement('button');
      advBtn.className = 'advanced-btn';
      advBtn.innerHTML = `🎛️ 상세 필터${advancedCount > 0 ? `<span class="badge">${advancedCount}</span>` : ''}`;
      advBtn.addEventListener('click', openFilterModal);
      filterBar.appendChild(advBtn);

      filterOptions
        .filter(g => g.placement === 'advanced')
        .forEach(group => {
          state.activeTags[group.categoryKey].forEach(value => {
            const pill = document.createElement('span');
            pill.className = 'active-tag';
            pill.innerHTML = `${value} <button aria-label="${value} 해제" title="해제">✕</button>`;
            pill.querySelector('button').addEventListener('click', () => {
              toggleTag(group.categoryKey, value);
              renderFilterBar();
              renderAdvancedChips();
              applyAndRender();
            });
            filterBar.appendChild(pill);
          });
        });
    }

    function toggleTag(categoryKey, value) {
      const arr = state.activeTags[categoryKey];
      const idx = arr.indexOf(value);
      if (idx > -1) arr.splice(idx, 1);
      else arr.push(value);
    }

    /* ============================================================
       2) 상세 필터 모달
       ============================================================ */
    function renderAdvancedChips() {
      advancedFilterArea.innerHTML = '';
      filterOptions
        .filter(g => g.placement === 'advanced')
        .forEach(group => {
          const section = document.createElement('div');
          section.className = 'filter-section';

          const h3 = document.createElement('h3');
          h3.textContent = group.category;
          section.appendChild(h3);

          const row = document.createElement('div');
          row.className = 'chip-row';

          group.options.forEach(opt => {
            const isActive = state.activeTags[group.categoryKey].includes(opt.value);
            const chip = document.createElement('div');
            chip.className = 'chip' + (isActive ? ' active' : '');
            chip.textContent = opt.label;
            chip.addEventListener('click', () => {
              toggleTag(group.categoryKey, opt.value);
              renderAdvancedChips();
              renderFilterBar();
              applyAndRender();
            });
            row.appendChild(chip);
          });

          section.appendChild(row);
          advancedFilterArea.appendChild(section);
        });
    }

    function openFilterModal() {
      renderAdvancedChips();
      filterModalOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      closeSortDropdown();
    }
    function closeFilterModal() {
      filterModalOverlay.classList.remove('active');
      document.body.style.overflow = '';
    }

    /* ============================================================
       3) 커스텀 정렬 드롭다운
       ============================================================ */
    function renderSortPopup() {
      sortPopup.innerHTML = '';
      sortOptions.forEach(opt => {
        const li = document.createElement('li');
        li.setAttribute('role', 'option');
        li.dataset.key = opt.key;
        if (opt.key === state.sortKey) li.classList.add('selected');
        li.innerHTML = `<span>${opt.label}</span><span class="check">✓</span>`;
        li.addEventListener('click', () => {
          state.sortKey = opt.key;
          updateSortBtnLabel();
          renderSortPopup();
          closeSortDropdown();
          applyAndRender();
        });
        sortPopup.appendChild(li);
      });
    }

    function updateSortBtnLabel() {
      const current = sortOptions.find(o => o.key === state.sortKey);
      sortBtnLabel.textContent = current ? current.label : '';
    }

    function openSortDropdown() {
      sortDropdown.classList.add('open');
      sortBtn.setAttribute('aria-expanded', 'true');
    }
    function closeSortDropdown() {
      sortDropdown.classList.remove('open');
      sortBtn.setAttribute('aria-expanded', 'false');
    }
    function toggleSortDropdown() {
      if (sortDropdown.classList.contains('open')) closeSortDropdown();
      else openSortDropdown();
    }

    sortBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleSortDropdown();
    });

    document.addEventListener('click', (e) => {
      if (!sortDropdown.contains(e.target)) closeSortDropdown();
    });

    /* ============================================================
       4) 필터링 + 정렬 + 렌더링
       ============================================================ */
    function applyAndRender() {
      let list = [...companies];

      if (state.keyword) {
        const kw = state.keyword.toLowerCase();
        list = list.filter(co =>
          co.companyName.toLowerCase().includes(kw) ||
          co.position.title.toLowerCase().includes(kw)
        );
      }

      list = list.filter(co => {
        const coTags = co.tags || [];
        return filterOptions.every(group => {
          const selected = state.activeTags[group.categoryKey];
          if (!selected || selected.length === 0) return true;
          return selected.some(tag => coTags.includes(tag));
        });
      });

      if (state.showOnlyBookmarks) {
        const bookmarks = getBookmarks();
        list = list.filter(co => bookmarks.includes(co.id));
      }

      const current = sortOptions.find(o => o.key === state.sortKey);
      if (current) list.sort(current.sort);

      renderCards(list);
    }

    function resetAllFilters() {
      state.keyword = "";
      state.showOnlyBookmarks = false;
      filterOptions.forEach(g => { state.activeTags[g.categoryKey] = []; });
      searchInput.value = "";

      renderFilterBar();
      renderAdvancedChips();
      applyAndRender();
    }

    /* ============================================================
       5) 카드 렌더링
       ============================================================ */
    function renderCards(list) {
      cardGrid.innerHTML = '';

      if (list.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'no-result';
        empty.innerHTML = `
          <div class="empty-emoji">🔍</div>
          <h3>😢 조건에 맞는 공고가 없어요.</h3>
          <p>검색어를 줄이거나, 선택한 필터를 해제해 보세요.</p>
          <button type="button" class="reset-btn" id="resetAllBtn">
            🔄 필터 초기화하고 전체 보기
          </button>
        `;
        cardGrid.appendChild(empty);
        countNum.textContent = 0;
        document.getElementById('resetAllBtn').addEventListener('click', resetAllFilters);
        return;
      }

      countNum.textContent = list.length;

      list.forEach((co, idx) => {
        const bookmarked = isBookmarked(co.id);
        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = `${Math.min(idx * 40, 400)}ms`;

        card.innerHTML = `
          <button class="bookmark-btn ${bookmarked ? 'bookmarked' : ''}"
                  data-id="${co.id}" aria-label="찜하기">
            <span class="heart">${bookmarked ? '♥' : '♡'}</span>
          </button>
          <img src="${co.logo}" alt="${co.companyName} 로고" class="logo"
               onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2256%22 height=%2256%22><rect width=%2256%22 height=%2256%22 fill=%22%23f3eeff%22/><text x=%2228%22 y=%2234%22 text-anchor=%22middle%22 fill=%22%236a11cb%22 font-size=%2220%22 font-weight=%22bold%22>${co.companyName.charAt(0)}</text></svg>'">
          <div class="company-name">${co.companyName}</div>
          <div class="position-title">${co.position.title}</div>
          <div class="tags">
            <span class="tag">${co.employmentType}</span>
            <span class="tag">📍 ${co.location}</span>
          </div>
        `;
        card.addEventListener('click', () => openModal(co));

        const btn = card.querySelector('.bookmark-btn');
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleBookmark(co.id);
          if (state.showOnlyBookmarks) {
            applyAndRender();
          } else {
            const now = isBookmarked(co.id);
            btn.classList.toggle('bookmarked', now);
            btn.querySelector('.heart').textContent = now ? '♥' : '♡';
          }
        });

        cardGrid.appendChild(card);
      });
    }

    /* ============================================================
       6) 기업 상세 모달
          🆕 첨부파일은 hasAttachment(co)가 true일 때만 렌더
       ============================================================ */
    function openModal(co) {
      const d = co.details;
      const toList = arr => arr.map(item => `<li>${item}</li>`).join('');

      // 첨부파일 버튼: 유효한 파일 경로가 있을 때만 HTML 생성
      const attachmentHTML = hasAttachment(co)
        ? `<a href="${co.attachment}" download class="download-btn">📥 첨부파일 다운로드</a>`
        : '';

      modalContent.innerHTML = `
        <div class="modal-header">
          <div class="top">
            <img src="${co.logo}" alt="${co.companyName}" onerror="this.style.display='none'">
            <div>
              <h2>${co.companyName}</h2>
              <a href="${co.homepage}" target="_blank" rel="noopener">${co.homepage} ↗</a>
            </div>
          </div>
          <div class="position">${co.position.title}</div>
        </div>
        <div class="modal-body">
          <div class="info-grid">
            <div><span class="label">고용 형태</span>${co.employmentType}</div>
            <div><span class="label">근무지</span>${co.position.workplace}</div>
            <div><span class="label">모집 인원</span>${co.position.headcount}</div>
            <div><span class="label">입사 예정일</span>${co.position.startDate}</div>
            <div><span class="label">소속 팀</span>${co.position.team}</div>
            <div><span class="label">주요 자격요건</span>${co.position.requirements}</div>
          </div>

          ${attachmentHTML}

          <div class="section">
            <h3>1. 우리가 어떤 회사인지 소개할게요</h3>
            <div class="sub-title">🎯 해결하는 문제</div><p>${d.about.problem}</p>
            <div class="sub-title">📈 성장 과정</div><p>${d.about.history}</p>
            <div class="sub-title">🌟 비전</div><p>${d.about.vision}</p>
          </div>
          <div class="section">
            <h3>2. 합류하면 이런 일을 하게 돼요</h3>
            <ul>${toList(d.responsibilities)}</ul>
          </div>
          <div class="section">
            <h3>3. 이런 분이면 잘 맞아요</h3>
            <div class="sub-title">✅ 필수 요건</div>
            <ul>${toList(d.qualifications.must)}</ul>
            <div class="sub-title">💜 인재상</div>
            <p>${d.qualifications.personality}</p>
          </div>
          <div class="section">
            <h3>4. 여기서만 얻을 수 있는 성장 경험</h3>
            <ul>${toList(d.growth)}</ul>
          </div>
          <div class="section">
            <h3>5. 보상과 복지</h3>
            <ul>${toList(d.benefits)}</ul>
          </div>
          <div class="section">
            <h3>6. 이렇게 함께 하게 돼요</h3>
            <ul>${toList(d.process)}</ul>
          </div>
        </div>
      `;

      modalOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      closeSortDropdown();
    }
    function closeModal() {
      modalOverlay.classList.remove('active');
      document.body.style.overflow = '';
    }

    /* ============================================================
       7) 이벤트 바인딩
       ============================================================ */
    closeBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', e => {
      if (e.target === modalOverlay) closeModal();
    });

    filterCloseBtn.addEventListener('click', closeFilterModal);
    filterDoneBtn.addEventListener('click', closeFilterModal);
    filterModalOverlay.addEventListener('click', e => {
      if (e.target === filterModalOverlay) closeFilterModal();
    });
    resetAdvancedBtn.addEventListener('click', () => {
      filterOptions
        .filter(g => g.placement === 'advanced')
        .forEach(g => { state.activeTags[g.categoryKey] = []; });
      renderAdvancedChips();
      renderFilterBar();
      applyAndRender();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (sortDropdown.classList.contains('open')) closeSortDropdown();
        if (filterModalOverlay.classList.contains('active')) closeFilterModal();
        if (modalOverlay.classList.contains('active')) closeModal();
      }
    });

    searchInput.addEventListener('input', e => {
      state.keyword = e.target.value.trim();
      applyAndRender();
    });

    /* ============================================================
       8) 초기 실행
       ============================================================ */
    renderFilterBar();
    renderSortPopup();
    updateSortBtnLabel();
    applyAndRender();
  </script>
</body>
</html>
